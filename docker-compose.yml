version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: diploma
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d diploma"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: strongpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_SCRIPT: src/manager/app.js
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      worker-js:
        condition: service_started
      worker-ts:
        condition: service_started
      worker-py:
        condition: service_started
    environment:
      PORT: 3000
      MANAGER_PUBLIC_URL: http://manager:3000
      WORKER_JS_URL: http://worker-js:4001
      WORKER_TS_URL: http://worker-ts:4002
      WORKER_PY_URL: http://worker-py:4003
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: strongpassword
      MINIO_SOURCE_BUCKET: preprocessed
      MINIO_RESULT_BUCKET: processed-files
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: diploma
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MAX_POOL_SIZE: 10
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 2592000
      JWT_REFRESH_COOKIE_NAME: refreshToken
      JWT_COOKIE_SECURE: "false"
      DEFAULT_AVATAR_BASE_URL: https://cdn.example.com/avatars
    ports:
      - "3000:3000"

  worker-js:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_SCRIPT: src/workers/js/app.js
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: strongpassword
      MINIO_SOURCE_BUCKET: preprocessed
      MINIO_RESULT_BUCKET: processed-files
    ports:
      - "4001:4001"

  worker-ts:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_SCRIPT: src/workers/typescript/app.js
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: strongpassword
      MINIO_SOURCE_BUCKET: preprocessed
      MINIO_RESULT_BUCKET: processed-files
    ports:
      - "4002:4002"

  worker-py:
    build:
      context: .
      dockerfile: Dockerfile.python
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: strongpassword
      MINIO_SOURCE_BUCKET: preprocessed
      MINIO_RESULT_BUCKET: processed-files
      WORKER_PY_PORT: 4003
    ports:
      - "4003:4003"

volumes:
  postgres-data:
  minio-data:
