openapi: 3.0.3
info:
  title: Architecture Analysis Platform API
  version: 1.1.0
  description: |
    API for frontend integration with the manager service.
    Includes file analysis flow and user registration.

    Recommended frontend flow:
    1. Register user via POST /v1/auth/register (optional for now, if auth is enabled in UI).
    2. Upload source file via POST /upload.
    3. Poll GET /jobs/{jobId} until status becomes COMPLETED or FAILED.
    4. Fetch final aggregated graph via GET /graph.
servers:
  - url: http://127.0.0.1:3000/api
    description: Local manager API
tags:
  - name: Auth
  - name: Health
  - name: Upload
  - name: Jobs
  - name: Graph
  - name: Workers
paths:
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      description: |
        Creates a new user, returns access token in response body
        and refresh token in HttpOnly cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '200':
          description: User successfully registered
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie (`refreshToken`)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
              examples:
                success:
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiJ9...
                    expiresIn: 900
                    user:
                      login: ivan.petrov
                      firstName: Ivan
                      lastName: Petrov
                      avatarUrl: https://cdn.example.com/avatars/ivan.petrov/default.webp
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
              examples:
                shortPassword:
                  value:
                    message: Field "password" must be between 8 and 72 characters.
        '409':
          description: User with this login already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageErrorResponse'
              examples:
                duplicateLogin:
                  value:
                    message: User with this login already exists.

  /health:
    get:
      tags: [Health]
      summary: Manager health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /workers:
    get:
      tags: [Workers]
      summary: List configured workers
      responses:
        '200':
          description: Worker list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkerDefinition'

  /upload:
    post:
      tags: [Upload]
      summary: Upload a source file for analysis
      description: Multipart upload with a required `file` field.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Source code file (.js, .ts, .py, ...)
      responses:
        '202':
          description: File accepted and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRecord'
        '400':
          description: Invalid multipart payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal manager error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Worker request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRecord'

  /jobs:
    get:
      tags: [Jobs]
      summary: List all submitted jobs
      responses:
        '200':
          description: Jobs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobRecord'

  /jobs/{jobId}:
    get:
      tags: [Jobs]
      summary: Get a job by jobId
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job identifier returned by POST /upload
          schema:
            type: string
      responses:
        '200':
          description: Job found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRecord'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /graph:
    get:
      tags: [Graph]
      summary: Get aggregated architecture graph
      description: |
        Main endpoint for frontend graph rendering.
        Returns normalized graph merged from completed analyses.
      responses:
        '200':
          description: Graph response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphResponse'
        '500':
          description: Graph aggregation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    AuthRegisterRequest:
      type: object
      required: [login, password, firstName, lastName]
      properties:
        login:
          type: string
          minLength: 3
          maxLength: 32
          example: ivan.petrov
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: Sup3rStrong!
        firstName:
          type: string
          maxLength: 60
          example: Ivan
        lastName:
          type: string
          maxLength: 60
          example: Petrov

    PublicUser:
      type: object
      required: [login, firstName, lastName, avatarUrl]
      properties:
        login:
          type: string
          example: ivan.petrov
        firstName:
          type: string
          example: Ivan
        lastName:
          type: string
          example: Petrov
        avatarUrl:
          type: string
          format: uri
          example: https://cdn.example.com/avatars/ivan.petrov/default.webp

    AuthTokensResponse:
      type: object
      required: [accessToken, expiresIn, user]
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        expiresIn:
          type: integer
          example: 900
          description: Access token lifetime in seconds
        user:
          $ref: '#/components/schemas/PublicUser'

    MessageErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    HealthResponse:
      type: object
      required: [service, status, time]
      properties:
        service:
          type: string
          example: manager
        status:
          type: string
          example: ok
        time:
          type: string
          format: date-time

    WorkerDefinition:
      type: object
      required: [language, workerName]
      properties:
        language:
          type: string
          example: typescript
        workerName:
          type: string
          example: worker-typescript
        endpoint:
          type: string
          nullable: true
          example: http://127.0.0.1:4002/process

    JobStatus:
      type: string
      enum:
        - RECEIVED
        - STORED
        - DISPATCHED
        - PROCESSING
        - COMPLETED
        - FAILED
        - UNSUPPORTED

    AnalysisSummary:
      type: object
      nullable: true
      properties:
        modules:
          type: integer
          example: 1
        entities:
          type: integer
          example: 3
        relations:
          type: integer
          example: 5
        imports:
          type: integer
          example: 1
        calls:
          type: integer
          example: 2
        diagnostics:
          type: integer
          example: 0

    ErrorObject:
      nullable: true
      oneOf:
        - type: 'null'
        - type: object
          properties:
            code:
              type: string
              example: WORKER_REQUEST_FAILED
            message:
              type: string
              example: connect ECONNREFUSED 127.0.0.1:4002

    JobRecord:
      type: object
      required:
        - jobId
        - hash
        - language
        - originalName
        - mimeType
        - size
        - sourceObjectKey
        - status
        - createdAt
        - updatedAt
        - uploaded
      properties:
        jobId:
          type: string
          example: bfad2abf-2eb3-4ec5-8c25-5a0c8ce2aca0
        hash:
          type: string
        language:
          type: string
          nullable: true
          example: typescript
        originalName:
          type: string
          example: bridge-feature.ts
        mimeType:
          type: string
          example: application/octet-stream
        size:
          type: integer
          example: 185
        sourceObjectKey:
          type: string
        resultObjectKey:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/JobStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        worker:
          type: string
          nullable: true
        uploaded:
          type: boolean
        analysisSummary:
          $ref: '#/components/schemas/AnalysisSummary'
        error:
          $ref: '#/components/schemas/ErrorObject'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          nullable: true

    GraphModule:
      type: object
      required: [id, name, path, hash, language]
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        hash:
          type: string
          nullable: true
        language:
          type: string
          example: typescript

    GraphNode:
      type: object
      required: [id, kind, name]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [module, function, class, interface, type, enum, variable, external, call]
        name:
          type: string
        parentId:
          type: string
          nullable: true
        moduleId:
          type: string
          nullable: true
        data:
          type: object
          additionalProperties: true

    GraphEdge:
      type: object
      required: [id, from, to, kind]
      properties:
        id:
          type: string
        from:
          type: string
        to:
          type: string
        kind:
          type: string
          enum: [contains, imports, module-import, symbol-import, calls, cross-module-call]
        data:
          type: object
          additionalProperties: true

    GraphResponse:
      type: object
      required: [nodes, edges, modules]
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/GraphEdge'
        modules:
          type: array
          items:
            $ref: '#/components/schemas/GraphModule'
